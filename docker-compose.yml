services:

  # ─── Base de données ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: projet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: projet_db
      MYSQL_USER: projet_user
      MYSQL_PASSWORD: projet_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - projet_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Front Office ───────────────────────────────────────────────────────────
  frontoffice:
    build:
      context: .
      dockerfile: docker/apache-php.Dockerfile
    container_name: projet_frontoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontoffice:/var/www/html:rw
      - ./docker/frontoffice.conf:/etc/apache2/sites-enabled/000-default.conf:ro
    environment:
      DB_HOST: db
      DB_NAME: projet_db
      DB_USER: projet_user
      DB_PASS: projet_password
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - projet_net

  # ─── Back Office ────────────────────────────────────────────────────────────
  backoffice:
    build:
      context: .
      dockerfile: docker/apache-php.Dockerfile
    container_name: projet_backoffice
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./backoffice:/var/www/html:rw
      - ./docker/backoffice.conf:/etc/apache2/sites-enabled/000-default.conf:ro
    environment:
      DB_HOST: db
      DB_NAME: projet_db
      DB_USER: projet_user
      DB_PASS: projet_password
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - projet_net

volumes:
  db_data:

networks:
  projet_net:
    driver: bridge
