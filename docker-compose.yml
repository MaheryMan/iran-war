services:

  # ─── Base de données ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: iran_war_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: iran_war
    volumes:
      - iran_war_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - iran_war_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Front Office ───────────────────────────────────────────────────────────
  frontoffice:
    build:
      context: .
      dockerfile: docker/apache-php.Dockerfile
    container_name: iran_war_frontoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontoffice:/var/www/html:rw
      - ./docker/frontoffice.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./uploads:/var/www/html/public/images:rw # Le pont vers les images
    environment:
      DB_HOST: db
      DB_NAME: iran_war
      DB_USER: root
      DB_PASS: ""
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iran_war_net

  # ─── Back Office ────────────────────────────────────────────────────────────
  backoffice:
    build:
      context: .
      dockerfile: docker/apache-php.Dockerfile
    container_name: iran_war_backoffice
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./backoffice:/var/www/html:rw
      - ./docker/backoffice.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./uploads:/var/www/html/public/images:rw
    environment:
      DB_HOST: db
      DB_NAME: iran_war
      DB_USER: root
      DB_PASS: ""
      APP_ENV: development
      TINYMCE_API_KEY: ${TINYMCE_API_KEY:-no-api-key}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iran_war_net

volumes:
  iran_war_data:

networks:
  iran_war_net:
    driver: bridge
