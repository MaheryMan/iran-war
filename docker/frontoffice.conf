<VirtualHost *:80>
    ServerName frontoffice.local
    DocumentRoot /var/www/html

    # ─── Logs ────────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/frontoffice_error.log
    CustomLog ${APACHE_LOG_DIR}/frontoffice_access.log combined

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ─── Compression Gzip (deflate) ──────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE text/javascript application/javascript
        AddOutputFilterByType DEFLATE application/json application/xml
        AddOutputFilterByType DEFLATE image/svg+xml application/xhtml+xml
        # Exclure les navigateurs bugués
        BrowserMatch ^Mozilla/4 gzip-only-text/html
        BrowserMatch ^Mozilla/4\.0[678] no-gzip
        BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
    </IfModule>

    # ─── Cache navigateur (expires) ──────────────────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        # Images
        ExpiresByType image/jpg            "access plus 1 month"
        ExpiresByType image/jpeg           "access plus 1 month"
        ExpiresByType image/gif            "access plus 1 month"
        ExpiresByType image/png            "access plus 1 month"
        ExpiresByType image/webp           "access plus 1 month"
        ExpiresByType image/svg+xml        "access plus 1 month"
        ExpiresByType image/x-icon         "access plus 1 year"
        # Fonts
        ExpiresByType font/woff            "access plus 1 year"
        ExpiresByType font/woff2           "access plus 1 year"
        ExpiresByType application/font-woff "access plus 1 year"
        # CSS / JS
        ExpiresByType text/css             "access plus 1 month"
        ExpiresByType text/javascript      "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        # HTML (pas de cache long pour le contenu dynamique)
        ExpiresByType text/html            "access plus 0 seconds"
    </IfModule>

    # ─── Headers sécurité & perf ─────────────────────────────────────────────
    <IfModule mod_headers.c>
        # Sécurité de base
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        # Cache assets statiques (si pas géré par expires)
        <FilesMatch "\.(css|js|woff|woff2|png|jpg|jpeg|gif|webp|svg|ico)$">
            Header set Cache-Control "public, max-age=2592000"
        </FilesMatch>
        # Pas de cache sur le PHP
        <FilesMatch "\.php$">
            Header set Cache-Control "no-store, no-cache, must-revalidate"
        </FilesMatch>
        # Supprime la signature du serveur
        Header unset Server
        Header always unset X-Powered-By
    </IfModule>

</VirtualHost>
